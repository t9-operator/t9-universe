<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>编号激活</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 24px;
      font-weight: bold;
    }
    form {
      width: 80%;
      max-width: 320px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: none;
      background-color: #111;
      color: #fff;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background-color: #007bff;
      border: none;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>激活你的编号</h1>
  <form action="/t9/000/main.html" method="get">
    <input type="text" name="编号" placeholder="编号：" required />
    <input type="text" name="口令" placeholder="激活口令：" required />
    <button type="submit">激活</button>
  </form>
</body>
</html>
