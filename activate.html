<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>激活编号</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: "Helvetica Neue", sans-serif;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    input {
      padding: 10px;
      font-size: 16px;
      margin: 10px;
      width: 250px;
    }
    button {
      padding: 10px 30px;
      font-size: 18px;
      border: 1px solid #fff;
      background-color: transparent;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>激活你的编号</h1>
  <input type="text" id="code" placeholder="编号（如 000）" required>
  <input type="text" id="key" placeholder="激活口令" required>
  <button onclick="activate()">激活</button>

  <script>
    function activate() {
      const code = document.getElementById("code").value.trim();
      const key = document.getElementById("key").value.trim();

      if (code && key) {
        // 示例默认跳转编号路径
        window.location.href = `/t9/${code}/main.html`;
      } else {
        alert("请输入编号和口令");
      }
    }
  </script>
</body>
</html>
