<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
  <title>编号激活</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      text-align: center;
      padding: 100px 20px;
    }
    h2 {
      font-size: 28px;
      margin-bottom: 30px;
    }
    form {
      max-width: 300px;
      margin: auto;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
      border: none;
      border-radius: 4px;
    }
    button {
      background: #33aaff;
      color: white;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 4px;
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h2>激活你的编号</h2>
  <form>
    <input type="text" placeholder="编号：" required />
    <input type="text" placeholder="激活口令：" required />
    <button type="submit">激活</button>
  </form>
</body>
</html>
